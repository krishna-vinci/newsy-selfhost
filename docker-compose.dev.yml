services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8324:8324"
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://fastapi:8321
    restart: unless-stopped
    networks:
      - db-net
    depends_on:
      - fastapi
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/

  fastapi:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8321:8321"
    env_file:
      - .env
    volumes:
      - backup_data:/app/data/backups
      - reports_data:/app/reports
    command: ["fastapi", "dev", "main.py", "--host", "0.0.0.0", "--port", "8321"]
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - __pycache__/
            - .venv/
    restart: unless-stopped
    networks:
      - db-net
    depends_on:
      - newsy_db
      - redis

  newsy_db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1122
      - POSTGRES_DB=newsy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - db-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backup_data:
  reports_data:

networks:
  db-net:
    external: true
