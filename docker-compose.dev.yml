services:
  newsy-app:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: development
    env_file:
      - .env
    ports:
      - "3456:3456"
      - "${FASTAPI_HOST_PORT:-8765}:8765"
      - "${FEED_DISCOVERY_HOST_PORT:-3460}:3460"
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://127.0.0.1:8765
      - AUTH_COOKIE_SECURE=false
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_DB=0
      - FEED_DISCOVERY_API_BASE_URL=http://127.0.0.1:3460
      - FEED_DISCOVERY_TIMEOUT_SECONDS=${FEED_DISCOVERY_TIMEOUT_SECONDS:-20}
      - RSS_GEN_CACHE_DIR=/tmp/rss-gen-cache
    volumes:
      - .:/app
      - /app/frontend/node_modules
      - backup_data:/app/data/backups
      - reports_data:/app/reports
    restart: unless-stopped
    networks:
      - db-net
    depends_on:
      - newsy_db

  go-scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
      target: development
    ports:
      - "8667:8667"
    environment:
      - DB_HOST=newsy_db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=1122
      - DB_NAME=newsy
      - PYTHON_BACKEND_URL=http://newsy-app:8765
      - WORKER_POOL_SIZE=100
      - POLLING_FREQUENCY=1m
      - BATCH_SIZE=100
      - POLLING_ERROR_LIMIT=10
      - POLLING_LIMIT_PER_HOST=5
      - CLEANUP_FREQUENCY=24h
      - SERVER_PORT=8667
      - LOG_LEVEL=info
    volumes:
      - ./scheduler:/app
    develop:
      watch:
        - action: sync+restart
          path: ./scheduler
          target: /app
        - action: rebuild
          path: ./scheduler/go.mod
    restart: unless-stopped
    networks:
      - db-net
    depends_on:
      - newsy_db
      - newsy-app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8667/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  newsy_db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1122
      - POSTGRES_DB=newsy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-net
    restart: unless-stopped

volumes:
  postgres_data:
  backup_data:
  reports_data:

networks:
  db-net:
