services:
  fastapi:
    build: .
    ports:
      - "8321:8321"
    env_file:
      - .env
    # --- Development with Hot-Reload ---
    # Uncomment the 'command' and 'develop' sections below to enable hot-reloading, disable both for production.
    # When enabled, changes to your local files will be synced to the container,
    # and the FastAPI server will automatically restart.
    # Run with `docker-compose up --build --watch`.
    # For production, comment out the 'command' and 'develop' sections.
    command: ["fastapi", "dev", "main.py", "--host", "0.0.0.0", "--port", "8321"]
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          # This 'watch' block replaces the need for a 'volumes' bind mount in development.

    restart: unless-stopped
    networks:
      - db-net
    depends_on:
      - newsy_db
      - redis

  newsy_db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1122
      - POSTGRES_DB=newsy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - db-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  db-net:
    external: true  # Make sure this is already created: docker network create db-net
