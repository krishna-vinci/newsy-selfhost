services:
  newsy-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "8324:8324"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://newsy-backend:8321
    restart: unless-stopped
    networks:
      - db-net
      - caddy-net
    depends_on:
      - newsy-backend

  newsy-backend:
    build: .
    ports:
      - "8321:8321"
    env_file:
      - .env
    volumes:
      - backup_data:/app/data/backups
      - reports_data:/app/reports
    restart: unless-stopped
    networks:
      - db-net
      - caddy-net
    depends_on:
      - newsy_db
      - newsy-redis

  newsy-worker:
    build: .
    env_file:
      - .env
    environment:
      - WORKER_COUNT=2  # Number of workers in single container
    restart: unless-stopped
    networks:
      - db-net
    depends_on:
      - newsy_db
      - newsy-redis
      - newsy-backend
    command: bash /app/start_workers.sh
    # Single container running 4 workers (uses ~400MB total)
    # Alternative: Use deploy.replicas: 4 for separate containers

  newsy_db:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1122
      - POSTGRES_DB=newsy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-net
    restart: unless-stopped

  newsy-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - db-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backup_data:
  reports_data:

networks:
  db-net:
    external: true  # Make sure this is already created: docker network create db-net
  caddy-net:
    external: true
